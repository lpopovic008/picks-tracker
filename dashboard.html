<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Capper Intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0D16;--surface:#141720;--surface2:#1C2030;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#F1F5F9;--muted:#94A3B8;
  --green:#22C55E;--red:#EF4444;--gold:#F59E0B;--blue:#60A5FA;
  --radius:12px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;min-height:100vh;padding-bottom:60px}
.wrap{max-width:880px;margin:0 auto;padding:0 18px}
.header{padding:24px 0 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:500;margin-bottom:3px}
.title{font-size:22px;font-weight:500}
.meta{font-size:11px;color:var(--muted);text-align:right}
.btn{background:var(--surface);border:.5px solid var(--border2);color:var(--muted);font-size:12px;font-family:'Inter',sans-serif;padding:6px 13px;border-radius:var(--radius-sm);cursor:pointer;margin-top:6px;display:inline-block}
.btn:hover{background:var(--surface2);color:var(--text)}
.banner{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;font-size:13px;color:var(--muted);margin-bottom:22px;display:none}
.banner.err{border-color:rgba(239,68,68,.35);color:#FCA5A5;display:block}
.banner.ok{border-color:rgba(34,197,94,.25);color:#86EFAC;display:block}
.banner.info{display:block}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:26px}
.mc{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.mc-lbl{font-size:11px;color:var(--muted);margin-bottom:3px}
.mc-val{font-size:21px;font-weight:500;font-family:'JetBrains Mono',monospace}
.section{margin-bottom:26px}
.sec-hdr{display:flex;align-items:center;gap:7px;margin-bottom:11px}
.sec-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.sec-badge{font-size:10px;color:var(--muted);background:var(--surface);border:.5px solid var(--border);padding:1px 7px;border-radius:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:13px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.capper-name{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sport{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;background:rgba(96,165,250,.12);color:var(--blue);margin-top:3px;display:inline-block}
.star{background:none;border:none;cursor:pointer;padding:2px;font-size:20px;line-height:1;min-width:30px;min-height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:transform .1s}
.star:active{transform:scale(.85)}
.record{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-bottom:9px}
.bar{display:flex;height:5px;border-radius:3px;overflow:hidden;gap:1px;margin-bottom:5px}
.bar-w{background:var(--green)}
.bar-l{background:var(--red)}
.bar-p{background:rgba(255,255,255,.15)}
.bar-u{background:rgba(255,255,255,.06)}
.pct{font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:500}
.hot-pct{color:var(--green)}
.cold-pct{color:var(--red)}
.mid-pct{color:var(--text)}
.none-pct{color:var(--muted)}
.empty{font-size:13px;color:var(--muted);padding:6px 0}
.divider{border:none;border-top:.5px solid var(--border);margin:4px 0 22px}
@media(max-width:480px){
  .grid{grid-template-columns:1fr 1fr}
  .metrics{gap:8px}
  .mc-val{font-size:18px}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <p class="eyebrow">Capper Intel</p>
      <p class="title" id="hdr-month">—</p>
    </div>
    <div class="meta">
      <p id="hdr-updated">—</p>
      <button class="btn" onclick="load()">Refresh</button>
    </div>
  </div>

  <div class="banner info" id="banner">Connecting to sheet...</div>

  <div class="metrics">
    <div class="mc"><p class="mc-lbl">Picks this month</p><p class="mc-val" id="m-total">—</p></div>
    <div class="mc"><p class="mc-lbl">Win rate</p><p class="mc-val" id="m-wr">—</p></div>
    <div class="mc"><p class="mc-lbl">Cappers</p><p class="mc-val" id="m-cap">—</p></div>
  </div>

  <div class="section">
    <div class="sec-hdr">
      <span style="font-size:16px">🔥</span>
      <span class="sec-title">Hot this month</span>
      <span class="sec-badge" id="hot-badge">0</span>
    </div>
    <div class="grid" id="hot-grid"></div>
    <p class="empty" id="hot-empty" style="display:none">No cappers above 55% with 2+ graded picks yet.</p>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="sec-hdr">
      <span style="font-size:16px">🥶</span>
      <span class="sec-title">Cold this month</span>
      <span class="sec-badge" id="cold-badge">0</span>
    </div>
    <div class="grid" id="cold-grid"></div>
    <p class="empty" id="cold-empty" style="display:none">No cappers below 40% with 2+ graded picks yet.</p>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="sec-hdr">
      <span style="font-size:16px">⭐</span>
      <span class="sec-title">My favorites</span>
      <span class="sec-badge" id="fav-badge">0</span>
    </div>
    <div class="grid" id="fav-grid"></div>
    <p class="empty" id="fav-empty">Tap the star on any capper to pin them here.</p>
  </div>

</div>
<script>
// ─── CONFIG ──────────────────────────────────────────────
// Paste your Sheet ID below (the long string from your sheet URL)
const SHEET_ID = "1NMSGufsCfJYSbEeKp1Zwdgws1UeqY9XxIKQoR6mf3Fg";
const HOT_PCT  = 55;
const COLD_PCT = 40;
const MIN_DEC  = 2;   // minimum graded (W or L) picks to appear in hot/cold
// ─────────────────────────────────────────────────────────

const FAV_KEY = "ci_favs";
const favs = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || "[]"));
const saveFavs = () => localStorage.setItem(FAV_KEY, JSON.stringify([...favs]));

function banner(msg, type) {
  const el = document.getElementById("banner");
  el.textContent = msg;
  el.className = "banner " + (type || "info");
}

async function fetchData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Picks`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Sheet not reachable (${r.status}). Check your Sheet ID.`);
  const txt = await r.text();
  if (!txt || txt.trim().length < 5) throw new Error("Sheet returned empty data.");
  if (txt.toLowerCase().includes("signin") || txt.toLowerCase().includes("<html")) {
    throw new Error('Sheet is private. Go to Google Sheets → Share → "Anyone with the link" → Viewer.');
  }
  return parseCSV(txt);
}

function parseCSVLine(line) {
  const out = []; let cur = ""; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (c === ',' && !inQ) { out.push(cur.trim()); cur = ""; }
    else cur += c;
  }
  out.push(cur.trim());
  return out;
}

function parseCSV(txt) {
  const lines = txt.trim().split("\n").filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]).map(h => h.replace(/^"|"$/g,"").toLowerCase().replace(/\s+/g,"_"));
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || "").replace(/^"|"$/g,""); });
    return obj;
  });
}

function monthKey() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;
}

function buildStats(rows) {
  const mk = monthKey();
  const map = {};
  for (const r of rows) {
    const d = String(r.date_utc || "").slice(0,7);
    if (d !== mk) continue;
    const name = String(r.capper || "").trim();
    if (!name) continue;
    if (!map[name]) map[name] = {name, sport: String(r.sport || "").trim(), w:0, l:0, push:0, pend:0};
    const res = String(r.result || "").trim();
    if (res === "W") map[name].w++;
    else if (res === "L") map[name].l++;
    else if (res.toLowerCase() === "push") map[name].push++;
    else map[name].pend++;
    if (r.sport) map[name].sport = String(r.sport).trim();
  }
  return Object.values(map).map(c => {
    const dec = c.w + c.l;
    const tot = dec + c.push + c.pend;
    const pct = dec > 0 ? Math.round(c.w / dec * 100) : null;
    return {...c, dec, tot, pct};
  });
}

function pctClass(p) {
  if (p === null) return "none-pct";
  if (p >= HOT_PCT) return "hot-pct";
  if (p <= COLD_PCT) return "cold-pct";
  return "mid-pct";
}

function makeCard(c) {
  const isFav = favs.has(c.name);
  const tot = c.tot || 1;
  const rec = `${c.w}W · ${c.l}L${c.push > 0 ? ` · ${c.push}P` : ""}${c.pend > 0 ? ` · ${c.pend} pending` : ""}`;
  const pctTxt = c.pct !== null ? `${c.pct}% win rate` : "No results yet";
  const sp = c.sport || "—";
  const safeName = c.name.replace(/'/g, "\\'");
  return `
<div class="card">
  <div class="card-top">
    <div style="flex:1;min-width:0">
      <p class="capper-name" title="${c.name}">${c.name}</p>
      <span class="sport">${sp}</span>
    </div>
    <button class="star" onclick="toggleFav('${safeName}')" aria-label="${isFav?"Unstar":"Star"} ${c.name}">
      ${isFav ? "⭐" : "☆"}
    </button>
  </div>
  <p class="record">${rec}</p>
  <div class="bar">
    ${c.w    > 0 ? `<div class="bar-w" style="flex:${c.w}"></div>` : ""}
    ${c.l    > 0 ? `<div class="bar-l" style="flex:${c.l}"></div>` : ""}
    ${c.push > 0 ? `<div class="bar-p" style="flex:${c.push}"></div>` : ""}
    ${c.pend > 0 ? `<div class="bar-u" style="flex:${c.pend}"></div>` : ""}
  </div>
  <p class="pct ${pctClass(c.pct)}">${pctTxt}</p>
</div>`;
}

function fill(gridId, emptyId, badgeId, caps) {
  document.getElementById(gridId).innerHTML  = caps.map(makeCard).join("");
  document.getElementById(emptyId).style.display = caps.length ? "none" : "";
  document.getElementById(badgeId).textContent = caps.length;
}

let allCaps = [];

function render() {
  const n = new Date();
  document.getElementById("hdr-month").textContent = n.toLocaleString("default",{month:"long",year:"numeric"});
  document.getElementById("hdr-updated").textContent = `Updated ${n.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}`;

  const tw = allCaps.reduce((s,c)=>s+c.w,0);
  const tl = allCaps.reduce((s,c)=>s+c.l,0);
  document.getElementById("m-total").textContent = allCaps.reduce((s,c)=>s+c.tot,0);
  document.getElementById("m-wr").textContent    = tw+tl > 0 ? Math.round(tw/(tw+tl)*100)+"%" : "—";
  document.getElementById("m-cap").textContent   = allCaps.length;

  const hot  = allCaps.filter(c=>c.pct!==null && c.dec>=MIN_DEC && c.pct>=HOT_PCT).sort((a,b)=>b.pct-a.pct).slice(0,6);
  const cold = allCaps.filter(c=>c.pct!==null && c.dec>=MIN_DEC && c.pct<=COLD_PCT).sort((a,b)=>a.pct-b.pct).slice(0,6);
  const fav  = allCaps.filter(c=>favs.has(c.name)).sort((a,b)=>(b.pct??-1)-(a.pct??-1));

  fill("hot-grid",  "hot-empty",  "hot-badge",  hot);
  fill("cold-grid", "cold-empty", "cold-badge", cold);
  fill("fav-grid",  "fav-empty",  "fav-badge",  fav);
}

function toggleFav(name) {
  favs.has(name) ? favs.delete(name) : favs.add(name);
  saveFavs();
  render();
}

async function load() {
  if (SHEET_ID === "YOUR_SHEET_ID_HERE") {
    banner("Open dashboard.html and replace YOUR_SHEET_ID_HERE with your actual Google Sheet ID.", "err");
    return;
  }
  banner("Connecting to sheet...", "info");
  try {
    const rows = await fetchData();
    allCaps = buildStats(rows);
    render();
    banner(`Loaded ${rows.length} picks across ${allCaps.length} cappers.`, "ok");
    setTimeout(() => { document.getElementById("banner").style.display = "none"; }, 3000);
  } catch(e) {
    banner("Error: " + e.message, "err");
    console.error(e);
  }
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
